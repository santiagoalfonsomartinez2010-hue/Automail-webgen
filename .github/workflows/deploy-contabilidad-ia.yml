name: Deploy Elena · Contabilidad IA

on:
  push:
    branches: [main]
    paths:
      - 'contabilidad-ia/**'
  workflow_dispatch: # permite lanzarlo manualmente desde GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contabilidad-ia/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: contabilidad-ia

      - name: Build
        run: npm run build
        working-directory: contabilidad-ia
        env:
          # Añade esto en tu repo: Settings → Secrets and variables → Actions
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: contabilidad-ia/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
