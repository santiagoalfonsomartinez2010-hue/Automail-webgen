services:
  - type: web
    name: empleado-ia
    runtime: node
    rootDir: empleado-ia
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MODO_SIMULACION
        value: "true"
      - key: ANTHROPIC_API_KEY
        value: "sk-ant-demo-sin-clave"
